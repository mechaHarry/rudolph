<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudolph</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<script>
(function(){var t=localStorage.getItem('rudolph-theme');if(t&&t!=='oneui')document.body.className='theme-'+t;})();
</script>

<!-- ── Header with inline KPIs ────────────────────── -->
<header>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 48 48" fill="none">
      <path d="M4 44 C2 48 36 30 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M4 27 C6 29 28 14 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <circle class="nose-ring" cx="36" cy="9" r="5" stroke="#e74c3c" stroke-width="4.5" fill="none"/>
    </svg>
    <h1>Rudolph</h1>
  </div>

  <div class="hdr-ticker">
    <select id="ticker-select" class="ticker-dropdown">
      <option value="CSCO" selected>CSCO</option>
    </select>
  </div>

  <div class="hdr-price">
    <span class="stock-price" id="stock-price"><span class="skel skel-price"></span></span>
    <span class="stock-change" id="stock-change"><span class="skel skel-change"></span></span>
  </div>

  <div class="hdr-kpi">
    <span class="hdr-kpi-label">Mkt Cap</span>
    <span class="hdr-kpi-value" id="kpi-mcap"><span class="skel skel-kpi"></span></span>
  </div>
  <div class="hdr-kpi">
    <span class="hdr-kpi-label">52w High</span>
    <span class="hdr-kpi-value" id="kpi-high"><span class="skel skel-kpi"></span></span>
  </div>
  <div class="hdr-kpi">
    <span class="hdr-kpi-label">52w Low</span>
    <span class="hdr-kpi-value" id="kpi-low"><span class="skel skel-kpi"></span></span>
  </div>
  <div class="hdr-refresh">
    <span class="hdr-kpi-label">Refresh</span>
    <div class="refresh-btns" id="refresh-btns">
      <button data-interval="1000" class="refresh-btn">1s</button>
      <button data-interval="5000" class="refresh-btn">5s</button>
      <button data-interval="30000" class="refresh-btn active">30s</button>
    </div>
  </div>
  <div class="hdr-theme">
    <select id="theme-select" class="theme-dropdown">
      <option value="oneui">Samsung OneUI</option>
      <option value="glass">Apple Liquid Glass</option>
      <option value="webex">Cisco Webex</option>
      <option value="fluent">Windows Fluent</option>
      <option value="material">Google Material</option>
      <option value="carbon">IBM Carbon</option>
    </select>
  </div>
  <div class="hdr-meta">
    <span><span class="live-dot"></span>&nbsp; Live</span>
    <span id="clock"></span>
  </div>
</header>

<!-- ── Dashboard: 3 columns, viewport-locked ──────── -->
<main>

  <!-- Hourly (1-minute intraday) -->
  <div class="card" id="hourly-card">
    <div class="card-header">
      <h2>Hour &mdash; Per Minute</h2>
      <div class="card-stats" id="hourly-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
    </div>
    <div class="chart-wrap">
      <div class="skel skel-chart" id="hourly-loader"></div>
      <canvas id="hourlyChart"></canvas>
    </div>
  </div>

  <!-- Daily (hourly intervals) -->
  <div class="card" id="stock-card">
    <div class="card-header">
      <h2>Today &mdash; Per Minute</h2>
      <div class="card-stats" id="today-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
    </div>
    <div class="chart-wrap">
      <div class="skel skel-chart" id="stock-loader"></div>
      <canvas id="stockChart"></canvas>
    </div>
  </div>

  <!-- COL 2: CSCO 1 Month -->
  <div class="card">
    <div class="card-header">
      <h2>1 Month &mdash; Per Day</h2>
      <div class="card-stats" id="month-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
    </div>
    <div class="chart-wrap">
      <div class="skel skel-chart" id="month-loader"></div>
      <canvas id="monthChart"></canvas>
    </div>
  </div>

  <!-- COL 3: CSCO 1 Year -->
  <div class="card">
    <div class="card-header">
      <h2>1 Year &mdash; Per Day</h2>
      <div class="card-stats" id="year-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
    </div>
    <div class="chart-wrap">
      <div class="skel skel-chart" id="year-loader"></div>
      <canvas id="yearChart"></canvas>
    </div>
  </div>

  <!-- COL 4: CSCO All-Time -->
  <div class="card">
    <div class="card-header">
      <h2>All-Time &mdash; Per Month</h2>
      <div class="card-stats" id="alltime-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
    </div>
    <div class="chart-wrap">
      <div class="skel skel-chart" id="alltime-loader"></div>
      <canvas id="alltimeChart"></canvas>
    </div>
  </div>

</main>

<footer>
  Stock: Yahoo Finance &bull; Auto-refreshes at selected interval
</footer>

<script src="js/chart.umd.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
