<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudolph</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ── Header with inline KPIs ────────────────────── -->
<header>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 48 48" fill="none">
      <path d="M4 44 C2 48 36 30 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M4 27 C6 29 28 14 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <circle class="nose-ring" cx="36" cy="9" r="5" stroke="#e74c3c" stroke-width="4.5" fill="none"/>
    </svg>
    <h1>Rudolph</h1>
  </div>

  <div class="hdr-kpi">
    <span class="hdr-kpi-label">Mkt Cap</span>
    <span class="hdr-kpi-value" id="kpi-mcap">--</span>
  </div>
  <div class="hdr-kpi">
    <span class="hdr-kpi-label">52w High</span>
    <span class="hdr-kpi-value" id="kpi-high">--</span>
  </div>
  <div class="hdr-kpi">
    <span class="hdr-kpi-label">52w Low</span>
    <span class="hdr-kpi-value" id="kpi-low">--</span>
  </div>
  <div class="hdr-refresh">
    <span class="hdr-kpi-label">Refresh</span>
    <div class="refresh-btns" id="refresh-btns">
      <button data-interval="1000" class="refresh-btn">1s</button>
      <button data-interval="5000" class="refresh-btn">5s</button>
      <button data-interval="30000" class="refresh-btn active">30s</button>
    </div>
  </div>
  <div class="hdr-meta">
    <span><span class="live-dot"></span>&nbsp; Live</span>
    <span id="clock"></span>
  </div>
</header>

<!-- ── Dashboard: 3 columns, viewport-locked ──────── -->
<main>

  <!-- COL 1: CSCO Today (1-day intraday) -->
  <div class="card" id="stock-card">
    <div class="card-header">
      <h2>CSCO &mdash; Today</h2>
      <span class="badge" id="stock-badge">--</span>
    </div>
    <div class="stock-headline">
      <span class="stock-price" id="stock-price">--</span>
      <span class="stock-change" id="stock-change"></span>
    </div>
    <div class="card-stats" id="today-stats"></div>
    <div class="chart-wrap">
      <div class="loading-overlay" id="stock-loader">
        <div class="spinner"></div> Loading&hellip;
      </div>
      <canvas id="stockChart"></canvas>
    </div>
  </div>

  <!-- COL 2: CSCO 1 Month -->
  <div class="card">
    <div class="card-header">
      <h2>CSCO &mdash; 1 Month</h2>
      <span class="badge" id="month-badge" style="background:rgba(0,188,235,.12);color:var(--accent);">1M</span>
    </div>
    <div class="card-stats" id="month-stats"></div>
    <div class="chart-wrap">
      <div class="loading-overlay" id="month-loader">
        <div class="spinner"></div> Loading&hellip;
      </div>
      <canvas id="monthChart"></canvas>
    </div>
  </div>

  <!-- COL 3: CSCO 1 Year -->
  <div class="card">
    <div class="card-header">
      <h2>CSCO &mdash; 1 Year</h2>
      <span class="badge" id="year-badge" style="background:rgba(0,188,235,.12);color:var(--accent);">1Y</span>
    </div>
    <div class="card-stats" id="year-stats"></div>
    <div class="chart-wrap">
      <div class="loading-overlay" id="year-loader">
        <div class="spinner"></div> Loading&hellip;
      </div>
      <canvas id="yearChart"></canvas>
    </div>
  </div>

  <!-- COL 4: CSCO All-Time -->
  <div class="card">
    <div class="card-header">
      <h2>CSCO &mdash; All-Time</h2>
      <span class="badge" id="alltime-badge" style="background:rgba(0,188,235,.12);color:var(--accent);">Max</span>
    </div>
    <div class="card-stats" id="alltime-stats"></div>
    <div class="chart-wrap">
      <div class="loading-overlay" id="alltime-loader">
        <div class="spinner"></div> Loading&hellip;
      </div>
      <canvas id="alltimeChart"></canvas>
    </div>
  </div>

</main>

<footer>
  Stock: Yahoo Finance &bull; Auto-refreshes at selected interval
</footer>

<script src="js/chart.umd.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
