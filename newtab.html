<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Rudolph</title>
  <link rel="stylesheet" href="css/gridstack.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<script>
(function(){
  var families=['oneui','glass','webex','fluent','material','carbon'];
  var rawTheme=localStorage.getItem('rudolph-theme');
  var rawAppearance=localStorage.getItem('rudolph-appearance');
  var family=families.indexOf(rawTheme)!==-1?rawTheme:'oneui';
  var pref=rawAppearance||(rawTheme==='light'||rawTheme==='dark'?rawTheme:(rawTheme==='system'?'auto':'auto'));
  if(pref==='system')pref='auto';
  if(pref!=='auto'&&pref!=='light'&&pref!=='dark')pref='auto';
  var mode=pref;
  if(pref==='auto'){
    try{mode=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}
    catch(e){mode='dark';}
  }
  document.body.className='theme-'+family+' mode-'+mode;
})();
</script>
<div id="glow-bg" aria-hidden="true"></div>

<div id="loader">
  <svg viewBox="0 0 48 48" fill="none">
    <path d="M4 44 C2 48 36 30 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M4 27 C6 29 28 14 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <circle class="loader-nose" cx="36" cy="9" r="5" stroke="#e74c3c" stroke-width="4.5" fill="none"/>
  </svg>
  <div id="loader-text">Loading&hellip;</div>
</div>

<!-- ── Header with inline KPIs ────────────────────── -->
<header>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 48 48" fill="none">
      <path d="M4 44 C2 48 36 30 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M4 27 C6 29 28 14 33 12" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <circle class="nose-ring" cx="36" cy="9" r="5" stroke="#e74c3c" stroke-width="4.5" fill="none"/>
    </svg>
    <h1>Rudolph</h1>
  </div>
  <div class="hdr-meta">
    <span><span class="live-dot"></span>&nbsp; Live</span>
    <span id="clock"></span>
  </div>

  <div class="hdr-ticker">
    <div class="ticker-combo" id="ticker-combo">
      <button class="ticker-btn" id="ticker-btn" type="button">CSCO</button>
      <div class="ticker-panel" id="ticker-panel">
        <input type="text" class="ticker-search" id="ticker-search" placeholder="Search stocks&hellip;" autocomplete="off">
        <div class="ticker-list" id="ticker-list"></div>
        <div class="ticker-panel-footer">Stock data from Yahoo Finance &bull; Auto-refreshes every 1s</div>
      </div>
    </div>
  </div>

  <div class="hdr-price">
    <span class="stock-price" id="stock-price"><span class="skel skel-price"></span></span>
    <span class="stock-change" id="stock-change"><span class="skel skel-change"></span></span>
  </div>

  <div class="hdr-controls">
    <button id="reset-layout-btn" class="reset-layout-btn" type="button" title="Reset grid layout">&#x21BB;</button>
    <div class="widget-menu-wrap" id="widget-menu-wrap">
      <button id="add-widget-btn" class="icon-btn" type="button" title="Add widget" aria-label="Add widget">+</button>
      <div class="widget-menu" id="widget-menu"></div>
    </div>
    <div class="theme-menu-wrap" id="theme-menu-wrap">
      <button id="theme-menu-btn" class="icon-btn" type="button" title="Theme" aria-label="Theme">&#9881;</button>
      <div class="theme-menu" id="theme-menu" role="menu">
        <button type="button" data-theme="oneui" role="menuitemradio">Samsung OneUI</button>
        <button type="button" data-theme="glass" role="menuitemradio">Apple Liquid Glass</button>
        <button type="button" data-theme="webex" role="menuitemradio">Cisco Webex</button>
        <button type="button" data-theme="fluent" role="menuitemradio">Windows Fluent</button>
        <button type="button" data-theme="material" role="menuitemradio">Google Material</button>
        <button type="button" data-theme="carbon" role="menuitemradio">IBM Carbon</button>
        <div class="theme-menu-footer" role="group" aria-label="Appearance">
          <div class="theme-menu-footer-label">Appearance</div>
          <div class="appearance-toggle" role="radiogroup" aria-label="Appearance mode">
            <button type="button" data-appearance="auto" role="radio">Auto</button>
            <button type="button" data-appearance="light" role="radio">Light</button>
            <button type="button" data-appearance="dark" role="radio">Dark</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Dashboard: draggable/resizable Gridstack ────── -->
<main class="grid-stack" id="dashboard-grid">

  <div class="grid-stack-item" gs-id="hourly" gs-x="0" gs-y="0" gs-w="12" gs-h="3" gs-min-w="4" gs-min-h="2">
    <div class="grid-stack-item-content card" id="hourly-card">
      <div class="card-header">
        <h2>Hour &mdash; Per Minute</h2>
        <div class="card-stats" id="hourly-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
        <button class="widget-close-btn" type="button" data-widget-id="hourly" title="Close widget" aria-label="Close Hour widget">&times;</button>
      </div>
      <div class="chart-wrap"><div class="skel skel-chart" id="hourly-loader"></div><canvas id="hourlyChart"></canvas></div>
    </div>
  </div>

  <div class="grid-stack-item" gs-id="stock" gs-x="0" gs-y="3" gs-w="6" gs-h="3" gs-min-w="4" gs-min-h="2">
    <div class="grid-stack-item-content card" id="stock-card">
      <div class="card-header">
        <h2>Today &mdash; Per Minute</h2>
        <div class="card-stats" id="today-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
        <button class="widget-close-btn" type="button" data-widget-id="stock" title="Close widget" aria-label="Close Today widget">&times;</button>
      </div>
      <div class="chart-wrap"><div class="skel skel-chart" id="stock-loader"></div><canvas id="stockChart"></canvas></div>
    </div>
  </div>

  <div class="grid-stack-item" gs-id="month" gs-x="6" gs-y="3" gs-w="6" gs-h="3" gs-min-w="4" gs-min-h="2">
    <div class="grid-stack-item-content card">
      <div class="card-header">
        <h2>1 Month &mdash; Per Day</h2>
        <div class="card-stats" id="month-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
        <button class="widget-close-btn" type="button" data-widget-id="month" title="Close widget" aria-label="Close 1 Month widget">&times;</button>
      </div>
      <div class="chart-wrap"><div class="skel skel-chart" id="month-loader"></div><canvas id="monthChart"></canvas></div>
    </div>
  </div>

  <div class="grid-stack-item" gs-id="year" gs-x="0" gs-y="6" gs-w="6" gs-h="3" gs-min-w="4" gs-min-h="2">
    <div class="grid-stack-item-content card">
      <div class="card-header">
        <h2>1 Year &mdash; Per Day</h2>
        <div class="card-stats" id="year-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
        <button class="widget-close-btn" type="button" data-widget-id="year" title="Close widget" aria-label="Close 1 Year widget">&times;</button>
      </div>
      <div class="chart-wrap"><div class="skel skel-chart" id="year-loader"></div><canvas id="yearChart"></canvas></div>
    </div>
  </div>

  <div class="grid-stack-item" gs-id="alltime" gs-x="6" gs-y="6" gs-w="6" gs-h="3" gs-min-w="4" gs-min-h="2">
    <div class="grid-stack-item-content card">
      <div class="card-header">
        <h2>All-Time &mdash; Per Month</h2>
        <div class="card-stats" id="alltime-stats"><span class="skel skel-pill"></span><span class="skel skel-pill"></span></div>
        <button class="widget-close-btn" type="button" data-widget-id="alltime" title="Close widget" aria-label="Close All-Time widget">&times;</button>
      </div>
      <div class="chart-wrap"><div class="skel skel-chart" id="alltime-loader"></div><canvas id="alltimeChart"></canvas></div>
    </div>
  </div>

</main>

<script src="js/chart.umd.min.js"></script>
<script src="js/gridstack.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
